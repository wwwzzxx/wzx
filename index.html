<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WZX - 个人主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>WZX</h1>
            <p>广东科学技术职业学院 | 商务数据分析与应用</p>
        </div>
    </header>
    
    <main>
        <section class="skills">
            <div class="container">
                <h2>专业技能</h2>
                <div class="skill-list">
                    <div class="skill-item">
                        <h3>数据分析</h3>
                        <p>熟练使用Excel、SQL进行数据处理和分析</p>
                    </div>
                    <div class="skill-item">
                        <h3>数据可视化</h3>
                        <p>掌握Tableau、Power BI等工具进行数据可视化</p>
                    </div>
                    <div class="skill-item">
                        <h3>商务智能</h3>
                        <p>了解企业级数据分析和决策支持系统</p>
                    </div>
                    <div class="skill-item">
                        <h3>市场分析</h3>
                        <p>具备市场调研和竞品分析能力</p>
                    </div>
                </div>
            </div>
        </section>
        
        <section class="interests">
            <div class="container">
                <h2>兴趣领域</h2>
                <div class="interest-list">
                    <div class="interest-item">
                        <h3>大数据分析</h3>
                        <p>对大数据技术和应用有浓厚兴趣</p>
                    </div>
                    <div class="interest-item">
                        <h3>人工智能</h3>
                        <p>关注AI在数据分析领域的应用</p>
                    </div>
                    <div class="interest-item">
                        <h3>数字营销</h3>
                        <p>研究数据驱动的营销策略</p>
                    </div>
                    <div class="interest-item">
                        <h3>商业模式创新</h3>
                        <p>探索数据如何驱动商业模式变革</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 WZX 个人主页</p>
        </div>
    </footer>
</body>
</html>
